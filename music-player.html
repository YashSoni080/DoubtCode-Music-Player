<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Player</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,wght@0,400;0,500;0,700;1,400&family=Google+Sans+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: linear-gradient(135deg, #e8f0ff 0%, #f5e8ff 35%, #ffe8f5 65%, #fff0e0 100%);
    --surface: rgba(255,255,255,0.72);
    --surface2: rgba(255,255,255,0.50);
    --surface3: rgba(220,210,240,0.35);
    --border: rgba(140,100,200,0.10);
    --border2: rgba(140,100,200,0.20);
    --accent: #7c4dbe;
    --accent2: #a066d6;
    --accent-dim: rgba(124,77,190,0.12);
    --text: #2a1f40;
    --text2: #6b5e8a;
    --text3: #b0a0cc;
    --danger: #d05070;
    --radius: 16px;
    --font-display: 'Google Sans', sans-serif;
    --font-mono: 'Google Sans Mono', 'Google Sans', sans-serif;
  }

  body {
    background: linear-gradient(135deg, #e8f0ff 0%, #f5e8ff 35%, #ffe8f5 65%, #fff0e0 100%);
    background-attachment: fixed;
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .app {
    width: 100vw;
    height: 100vh;
    display: grid;
    grid-template-columns: 300px 1fr;
    grid-template-rows: 1fr auto;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    grid-row: 1 / 3;
    background: var(--surface);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 28px 24px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .logo {
    font-family: var(--font-display);
    font-size: 28px;
    letter-spacing: 0.08em;
    color: var(--accent);
    margin-bottom: 4px;
  }

  .logo-sub {
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--text3);
    text-transform: uppercase;
  }

  .drop-zone {
    margin: 16px;
    border: 1.5px dashed var(--border2);
    border-radius: 12px;
    padding: 20px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    flex-shrink: 0;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: var(--accent-dim);
  }

  .drop-zone svg { color: var(--accent); margin-bottom: 8px; }

  .drop-zone p {
    font-size: 11px;
    color: var(--text2);
    line-height: 1.6;
  }

  .drop-zone strong { color: var(--accent2); font-weight: 500; }

  .formats {
    font-size: 9px;
    color: var(--text3);
    letter-spacing: 0.1em;
    margin-top: 6px;
  }

  #file-input { display: none; }

  .playlist-header {
    padding: 12px 20px 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .playlist-header span {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--text3);
    text-transform: uppercase;
  }

  .track-count {
    font-size: 10px;
    color: var(--text3);
    background: var(--surface3);
    border-radius: 100px;
    padding: 2px 8px;
  }

  .playlist {
    flex: 1;
    overflow-y: auto;
    padding: 4px 8px 8px;
  }

  .playlist::-webkit-scrollbar { width: 3px; }
  .playlist::-webkit-scrollbar-track { background: transparent; }
  .playlist::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

  .empty-state {
    padding: 32px 16px;
    text-align: center;
    color: var(--text3);
    font-size: 12px;
    line-height: 1.8;
  }

  .track-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }

  .track-item:hover { background: var(--surface2); }
  .track-item.active { background: var(--accent-dim); }
  .track-item.active .track-name { color: var(--accent2); }

  .track-num {
    font-size: 10px;
    color: var(--text3);
    min-width: 18px;
    text-align: right;
  }

  .track-item.active .track-num { display: none; }

  .playing-icon {
    display: none;
    min-width: 18px;
    align-items: center;
    justify-content: flex-end;
  }

  .track-item.active .playing-icon { display: flex; }

  .playing-bar {
    width: 2px;
    border-radius: 1px;
    background: var(--accent);
    animation: bar 0.8s ease-in-out infinite alternate;
  }
  .playing-bar:nth-child(1) { height: 8px; animation-delay: 0s; }
  .playing-bar:nth-child(2) { height: 14px; animation-delay: 0.2s; }
  .playing-bar:nth-child(3) { height: 10px; animation-delay: 0.4s; }
  .playing-bar:nth-child(4) { height: 6px; animation-delay: 0.1s; }

  @keyframes bar {
    from { transform: scaleY(0.3); }
    to { transform: scaleY(1); }
  }

  .track-info { flex: 1; min-width: 0; }

  .track-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .track-meta {
    font-size: 10px;
    color: var(--text3);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .track-duration {
    font-size: 10px;
    color: var(--text3);
  }

  .track-remove {
    opacity: 0;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--danger);
    padding: 2px;
    display: flex;
    align-items: center;
    transition: opacity 0.15s;
  }

  .track-item:hover .track-remove { opacity: 1; }

  /* ── Main ── */
  .main {
    grid-column: 2;
    grid-row: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    position: relative;
    overflow: hidden;
  }

  .bg-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    transition: all 1.5s ease;
  }

  .orb1 {
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(160,102,214,0.18) 0%, transparent 70%);
    top: -100px; right: -100px;
  }

  .orb2 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(240,120,160,0.14) 0%, transparent 70%);
    bottom: -50px; left: -50px;
  }

  .now-playing {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 1;
  }

  .artwork-wrap {
    position: relative;
    margin-bottom: 36px;
  }

  .artwork {
    width: 240px;
    height: 240px;
    border-radius: 20px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  .artwork.playing {
    box-shadow: 0 0 50px rgba(160,102,214,0.25), 0 16px 48px rgba(124,77,190,0.18);
    transform: scale(1.02);
  }

  .artwork-bg {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #ede0ff 0%, #fce8f5 100%);
  }

  .artwork-icon {
    position: relative;
    z-index: 1;
    color: var(--text3);
  }

  .artwork canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border-radius: 19px;
  }

  .track-title {
    font-family: var(--font-display);
    font-size: 28px;
    color: var(--text);
    text-align: center;
    margin-bottom: 6px;
    line-height: 1.2;
  }

  .track-artist {
    font-size: 12px;
    color: var(--text2);
    letter-spacing: 0.12em;
    text-align: center;
    margin-bottom: 32px;
  }

  /* Progress */
  .progress-wrap {
    width: 100%;
    margin-bottom: 24px;
  }

  .progress-bar-container {
    width: 100%;
    height: 3px;
    background: var(--surface3);
    border-radius: 2px;
    cursor: pointer;
    position: relative;
    margin-bottom: 10px;
  }

  .progress-bar-container:hover { height: 5px; margin-bottom: 8px; }
  .progress-bar-container:hover .progress-thumb { opacity: 1; }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2), #e060c0);
    border-radius: 2px;
    width: 0%;
    transition: width 0.1s linear;
    position: relative;
  }

  .progress-thumb {
    position: absolute;
    right: -5px;
    top: 50%;
    transform: translateY(-50%);
    width: 10px;
    height: 10px;
    background: var(--accent2);
    border-radius: 50%;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .time-row {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.08em;
  }

  /* Controls */
  .controls {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 28px;
  }

  .ctrl-btn {
    background: none;
    border: none;
    color: var(--text2);
    cursor: pointer;
    padding: 10px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    font-size: 10px;
    letter-spacing: 0.1em;
  }

  .ctrl-btn:hover { color: var(--text); background: var(--surface3); }
  .ctrl-btn.active { color: var(--accent); }

  .play-btn {
    width: 56px;
    height: 56px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 50%;
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(124,77,190,0.35);
    margin: 0 8px;
  }

  .play-btn:hover {
    transform: scale(1.06);
    box-shadow: 0 6px 32px rgba(124,77,190,0.50);
  }

  .play-btn:active { transform: scale(0.97); }

  /* Volume */
  .volume-row {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
  }

  .vol-icon { color: var(--text3); }

  .vol-slider {
    flex: 1;
    -webkit-appearance: none;
    height: 3px;
    background: var(--surface3);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  .vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    background: var(--text2);
    border-radius: 50%;
    cursor: pointer;
    transition: background 0.15s;
  }

  .vol-slider:hover::-webkit-slider-thumb { background: var(--accent2); }

  /* Bottom bar */
  .bottom-bar {
    grid-column: 2;
    grid-row: 2;
    border-top: 1px solid var(--border);
    background: rgba(255,255,255,0.60);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    padding: 10px 32px;
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .format-badge {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    background: var(--accent-dim);
    border: 1px solid rgba(124,77,190,0.25);
    border-radius: 4px;
    padding: 3px 8px;
  }

  .file-info {
    font-size: 10px;
    color: var(--text3);
    flex: 1;
  }

  .eq-canvas-wrap {
    display: flex;
    align-items: center;
    gap: 4px;
    height: 24px;
  }

  .mini-bar {
    width: 2px;
    border-radius: 1px;
    background: var(--text3);
    transition: height 0.1s;
  }

  /* Visualizer */
  #visualizer-canvas {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    pointer-events: none;
    opacity: 0.4;
  }

  /* Notification */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 12px 18px;
    font-size: 12px;
    color: var(--text2);
    z-index: 100;
    transform: translateY(60px);
    opacity: 0;
    transition: all 0.25s ease;
  }

  .toast.show { transform: translateY(0); opacity: 1; }

  /* Responsive tweaks */
  @media (max-width: 700px) {
    .app { grid-template-columns: 1fr; grid-template-rows: auto 1fr auto; }
    .sidebar { grid-row: 1; max-height: 40vh; border-right: none; border-bottom: 1px solid var(--border); }
    .main { grid-column: 1; grid-row: 2; padding: 24px 20px; }
    .bottom-bar { grid-column: 1; }
    .artwork { width: 160px; height: 160px; }
    .track-title { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">DoubtCode</div>
      <div class="logo-sub">Music Player</div>
    </div>

    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
      <svg width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 9l3-3m0 0l3 3m-3-3v8M7.5 21h9A2.25 2.25 0 0019 18.75V9.414a.75.75 0 00-.22-.53l-5.664-5.664A.75.75 0 0012.586 3H6.75A2.25 2.25 0 004.5 5.25v13.5A2.25 2.25 0 006.75 21z"/>
      </svg>
      <p><strong>Drop audio files</strong><br>or click to browse</p>
      <div class="formats">MP3 · FLAC · WAV · OGG · AAC · M4A · OPUS · AIFF · WMA</div>
    </div>

    <input type="file" id="file-input" multiple accept="audio/*,.flac,.ogg,.opus,.aiff,.wma,.wav,.mp3,.m4a,.aac,.webm">

    <div class="playlist-header">
      <span>Queue</span>
      <span class="track-count" id="track-count">0 tracks</span>
    </div>

    <div class="playlist" id="playlist">
      <div class="empty-state" id="empty-state">
        No tracks yet.<br>Add some music above.
      </div>
    </div>
  </aside>

  <!-- Main player -->
  <main class="main">
    <div class="bg-orb orb1"></div>
    <div class="bg-orb orb2"></div>
    <canvas id="visualizer-canvas" height="200"></canvas>

    <div class="now-playing">
      <div class="artwork-wrap">
        <div class="artwork" id="artwork">
          <div class="artwork-bg"></div>
          <svg class="artwork-icon" width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 9l10.5-3m0 6.553v3.75a2.25 2.25 0 01-1.632 2.163l-1.32.377a1.803 1.803 0 11-.99-3.467l2.31-.66a2.25 2.25 0 001.632-2.163zm0 0V2.25L9 5.25v10.303m0 0v3.75a2.25 2.25 0 01-1.632 2.163l-1.32.377a1.803 1.803 0 01-.99-3.467l2.31-.66A2.25 2.25 0 009 15.553z"/>
          </svg>
          <canvas id="art-canvas"></canvas>
        </div>
      </div>

      <div class="track-title" id="track-title">No track selected</div>
      <div class="track-artist" id="track-artist">— Open a file to begin —</div>

      <!-- Progress -->
      <div class="progress-wrap">
        <div class="progress-bar-container" id="progress-container">
          <div class="progress-fill" id="progress-fill">
            <div class="progress-thumb"></div>
          </div>
        </div>
        <div class="time-row">
          <span id="time-current">0:00</span>
          <span id="time-total">0:00</span>
        </div>
      </div>

      <!-- Controls -->
      <div class="controls">
        <button class="ctrl-btn" id="btn-shuffle" title="Shuffle" onclick="toggleShuffle()">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M7.5 21L3 16.5m0 0L7.5 12M3 16.5h13.5m0-13.5L21 7.5m0 0L16.5 12M21 7.5H7.5"/>
          </svg>
        </button>

        <button class="ctrl-btn" onclick="prevTrack()" title="Previous">
          <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
            <path d="M5.5 4.5a1 1 0 00-1 1v13a1 1 0 002 0v-5.5l10.7 6.1a1 1 0 001.5-.9V5.8a1 1 0 00-1.5-.9L6.5 11V5.5a1 1 0 00-1-1z"/>
          </svg>
        </button>

        <button class="play-btn" id="play-btn" onclick="togglePlay()">
          <svg id="play-icon" width="22" height="22" fill="currentColor" viewBox="0 0 24 24">
            <path d="M8 5.14v14l11-7-11-7z"/>
          </svg>
          <svg id="pause-icon" width="22" height="22" fill="currentColor" viewBox="0 0 24 24" style="display:none">
            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
          </svg>
        </button>

        <button class="ctrl-btn" onclick="nextTrack()" title="Next">
          <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
            <path d="M18.5 4.5a1 1 0 011 1v13a1 1 0 01-2 0v-5.5L6.8 19.1a1 1 0 01-1.5-.9V5.8a1 1 0 011.5-.9L17.5 11V5.5a1 1 0 011-1z"/>
          </svg>
        </button>

        <button class="ctrl-btn" id="btn-repeat" title="Repeat" onclick="toggleRepeat()">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 12c0 2.485-2.015 4.5-4.5 4.5H4.5M4.5 16.5l-3-3m3 3l3-3M4.5 12c0-2.485 2.015-4.5 4.5-4.5h10.5m0 0l3 3m-3-3l-3 3"/>
          </svg>
        </button>
      </div>

      <!-- Volume -->
      <div class="volume-row">
        <svg class="vol-icon" width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
          <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
        </svg>
        <input type="range" class="vol-slider" id="vol-slider" min="0" max="1" step="0.01" value="0.8" oninput="setVolume(this.value)">
        <svg class="vol-icon" width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
          <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
        </svg>
      </div>
    </div>
  </main>

  <!-- Bottom bar -->
  <div class="bottom-bar">
    <span class="format-badge" id="format-badge">—</span>
    <span class="file-info" id="file-info">No file loaded</span>
    <div class="eq-canvas-wrap" id="eq-mini">
      <div class="mini-bar" style="height:4px"></div>
      <div class="mini-bar" style="height:8px"></div>
      <div class="mini-bar" style="height:6px"></div>
      <div class="mini-bar" style="height:10px"></div>
      <div class="mini-bar" style="height:7px"></div>
      <div class="mini-bar" style="height:5px"></div>
      <div class="mini-bar" style="height:9px"></div>
      <div class="mini-bar" style="height:4px"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const audio = new Audio();
audio.volume = 0.8;
let tracks = [];
let currentIndex = -1;
let isPlaying = false;
let shuffle = false;
let repeat = 'none'; // none, one, all
let animFrame;

// Web Audio
let audioCtx, analyser, source, gainNode;

function setupAudioContext() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  gainNode = audioCtx.createGain();
  gainNode.gain.value = audio.volume;
  source = audioCtx.createMediaElementSource(audio);
  source.connect(analyser);
  analyser.connect(gainNode);
  gainNode.connect(audioCtx.destination);
}

// File handling
document.getElementById('file-input').addEventListener('change', e => addFiles(e.target.files));

const dropZone = document.getElementById('drop-zone');
document.body.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
document.body.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
document.body.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  addFiles(e.dataTransfer.files);
});

function addFiles(files) {
  const audio_exts = /\.(mp3|flac|wav|ogg|m4a|aac|opus|aiff|wma|webm|3gp|oga|caf|dsd|dsf|dff|ape|mpc|mp4)$/i;
  let added = 0;
  Array.from(files).forEach(f => {
    if (f.type.startsWith('audio/') || audio_exts.test(f.name)) {
      tracks.push({ file: f, name: cleanName(f.name), duration: null, url: URL.createObjectURL(f) });
      added++;
    }
  });
  if (added > 0) {
    renderPlaylist();
    if (currentIndex === -1) loadTrack(0);
    showToast(`Added ${added} track${added > 1 ? 's' : ''}`);
  } else {
    showToast('No supported audio files found');
  }
}

function cleanName(filename) {
  return filename.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ').trim();
}

function getExt(filename) {
  return filename.split('.').pop().toUpperCase();
}

function formatTime(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

function formatBytes(b) {
  if (b < 1024 * 1024) return (b / 1024).toFixed(0) + ' KB';
  return (b / (1024 * 1024)).toFixed(1) + ' MB';
}

function renderPlaylist() {
  const pl = document.getElementById('playlist');
  const empty = document.getElementById('empty-state');
  const count = document.getElementById('track-count');
  count.textContent = `${tracks.length} track${tracks.length !== 1 ? 's' : ''}`;

  if (tracks.length === 0) {
    empty.style.display = 'block';
    pl.querySelectorAll('.track-item').forEach(e => e.remove());
    return;
  }
  empty.style.display = 'none';

  pl.querySelectorAll('.track-item').forEach(e => e.remove());
  tracks.forEach((t, i) => {
    const item = document.createElement('div');
    item.className = 'track-item' + (i === currentIndex ? ' active' : '');
    item.dataset.index = i;
    item.innerHTML = `
      <div class="playing-icon">
        <div class="playing-bar"></div>
        <div class="playing-bar"></div>
        <div class="playing-bar"></div>
        <div class="playing-bar"></div>
      </div>
      <span class="track-num">${i + 1}</span>
      <div class="track-info">
        <div class="track-name">${t.name}</div>
        <div class="track-meta">${getExt(t.file.name)} · ${formatBytes(t.file.size)}</div>
      </div>
      <span class="track-duration">${t.duration ? formatTime(t.duration) : '--:--'}</span>
      <button class="track-remove" onclick="removeTrack(event, ${i})" title="Remove">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    `;
    item.addEventListener('click', () => loadTrack(i, true));
    pl.appendChild(item);
  });
}

function removeTrack(e, i) {
  e.stopPropagation();
  URL.revokeObjectURL(tracks[i].url);
  tracks.splice(i, 1);
  if (currentIndex === i) {
    if (tracks.length === 0) { stopAll(); currentIndex = -1; }
    else loadTrack(Math.min(i, tracks.length - 1), isPlaying);
  } else if (currentIndex > i) {
    currentIndex--;
  }
  renderPlaylist();
}

function loadTrack(index, autoplay = false) {
  if (index < 0 || index >= tracks.length) return;
  currentIndex = index;
  const t = tracks[index];
  audio.src = t.url;
  document.getElementById('track-title').textContent = t.name;
  document.getElementById('track-artist').textContent = getExt(t.file.name) + ' · ' + formatBytes(t.file.size);
  document.getElementById('format-badge').textContent = getExt(t.file.name);
  document.getElementById('file-info').textContent = t.file.name;
  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('time-current').textContent = '0:00';
  document.getElementById('time-total').textContent = '--:--';
  renderPlaylist();
  generateArtwork(t.name);

  audio.onloadedmetadata = () => {
    t.duration = audio.duration;
    document.getElementById('time-total').textContent = formatTime(audio.duration);
    renderPlaylist();
  };

  if (autoplay) { playAudio(); }
}

function playAudio() {
  setupAudioContext();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  audio.play().then(() => {
    isPlaying = true;
    updatePlayBtn();
    document.getElementById('artwork').classList.add('playing');
    startVisualizer();
  }).catch(() => {});
}

function pauseAudio() {
  audio.pause();
  isPlaying = false;
  updatePlayBtn();
  document.getElementById('artwork').classList.remove('playing');
}

function stopAll() {
  audio.pause();
  audio.src = '';
  isPlaying = false;
  updatePlayBtn();
  document.getElementById('track-title').textContent = 'No track selected';
  document.getElementById('track-artist').textContent = '— Open a file to begin —';
  document.getElementById('format-badge').textContent = '—';
  document.getElementById('file-info').textContent = 'No file loaded';
  document.getElementById('artwork').classList.remove('playing');
  clearArtCanvas();
}

function togglePlay() {
  if (tracks.length === 0) return;
  if (currentIndex === -1) loadTrack(0, true);
  else if (isPlaying) pauseAudio();
  else playAudio();
}

function updatePlayBtn() {
  document.getElementById('play-icon').style.display = isPlaying ? 'none' : 'block';
  document.getElementById('pause-icon').style.display = isPlaying ? 'block' : 'none';
}

function nextTrack() {
  if (tracks.length === 0) return;
  let next;
  if (shuffle) next = Math.floor(Math.random() * tracks.length);
  else next = (currentIndex + 1) % tracks.length;
  loadTrack(next, isPlaying);
}

function prevTrack() {
  if (tracks.length === 0) return;
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  let prev = (currentIndex - 1 + tracks.length) % tracks.length;
  loadTrack(prev, isPlaying);
}

function toggleShuffle() {
  shuffle = !shuffle;
  document.getElementById('btn-shuffle').classList.toggle('active', shuffle);
}

function toggleRepeat() {
  const modes = ['none', 'all', 'one'];
  repeat = modes[(modes.indexOf(repeat) + 1) % 3];
  const btn = document.getElementById('btn-repeat');
  btn.classList.toggle('active', repeat !== 'none');
  if (repeat === 'one') {
    btn.innerHTML = `<svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
      <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 12c0 2.485-2.015 4.5-4.5 4.5H4.5M4.5 16.5l-3-3m3 3l3-3M4.5 12c0-2.485 2.015-4.5 4.5-4.5h10.5m0 0l3 3m-3-3l-3 3"/>
    </svg><span style="font-size:9px;position:absolute;top:4px;right:4px;color:var(--accent)">1</span>`;
    btn.style.position = 'relative';
  } else {
    btn.style.position = '';
    btn.innerHTML = `<svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
      <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 12c0 2.485-2.015 4.5-4.5 4.5H4.5M4.5 16.5l-3-3m3 3l3-3M4.5 12c0-2.485 2.015-4.5 4.5-4.5h10.5m0 0l3 3m-3-3l-3 3"/>
    </svg>`;
  }
}

audio.addEventListener('ended', () => {
  if (repeat === 'one') { audio.currentTime = 0; playAudio(); }
  else if (repeat === 'all' || currentIndex < tracks.length - 1) nextTrack();
  else { isPlaying = false; updatePlayBtn(); document.getElementById('artwork').classList.remove('playing'); }
});

audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('time-current').textContent = formatTime(audio.currentTime);
});

// Seek
document.getElementById('progress-container').addEventListener('click', e => {
  if (!audio.duration) return;
  const rect = e.currentTarget.getBoundingClientRect();
  audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
});

let dragging = false;
document.getElementById('progress-container').addEventListener('mousedown', () => dragging = true);
document.addEventListener('mousemove', e => {
  if (!dragging || !audio.duration) return;
  const rect = document.getElementById('progress-container').getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  audio.currentTime = pct * audio.duration;
});
document.addEventListener('mouseup', () => dragging = false);

function setVolume(v) {
  audio.volume = v;
  if (gainNode) gainNode.gain.value = v;
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if (e.code === 'ArrowRight') { audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 5); }
  if (e.code === 'ArrowLeft') { audio.currentTime = Math.max(0, audio.currentTime - 5); }
  if (e.code === 'ArrowUp') { const v = Math.min(1, audio.volume + 0.05); audio.volume = v; document.getElementById('vol-slider').value = v; }
  if (e.code === 'ArrowDown') { const v = Math.max(0, audio.volume - 0.05); audio.volume = v; document.getElementById('vol-slider').value = v; }
  if (e.code === 'KeyN') nextTrack();
  if (e.code === 'KeyP') prevTrack();
});

// Visualizer
function startVisualizer() {
  if (!analyser) return;
  const canvas = document.getElementById('visualizer-canvas');
  const ctx = canvas.getContext('2d');
  const data = new Uint8Array(analyser.frequencyBinCount);

  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;

  function draw() {
    if (!isPlaying) { ctx.clearRect(0, 0, canvas.width, canvas.height); return; }
    animFrame = requestAnimationFrame(draw);
    analyser.getByteFrequencyData(data);

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const bars = 80;
    const step = Math.floor(data.length / bars);
    const barW = canvas.width / bars;

    for (let i = 0; i < bars; i++) {
      const val = data[i * step] / 255;
      const h = val * canvas.height * 0.9;
      const x = i * barW;
      const alpha = val * 0.5;
      ctx.fillStyle = `rgba(124, 77, 190, ${alpha})`;
      ctx.fillRect(x, canvas.height - h, barW - 1, h);
    }

    // mini EQ bars
    const miniBars = document.querySelectorAll('.mini-bar');
    const step2 = Math.floor(data.length / miniBars.length);
    miniBars.forEach((b, i) => {
      const v = data[i * step2] / 255;
      b.style.height = Math.max(3, v * 20) + 'px';
    });
  }
  cancelAnimationFrame(animFrame);
  draw();
}

// Generative artwork
function generateArtwork(name) {
  const canvas = document.getElementById('art-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = 240;
  canvas.height = 240;

  let seed = 0;
  for (let i = 0; i < name.length; i++) seed += name.charCodeAt(i);

  const rand = (s => {
    let x = Math.sin(s) * 10000;
    return () => { x = Math.sin(++s) * 10000; return x - Math.floor(x); };
  })(seed);

  const palettes = [
    ['#a066d6', '#7c4dbe', '#c084f5', '#e0b8ff'],
    ['#f06090', '#d04070', '#ff90b0', '#ffc8d8'],
    ['#6090f0', '#4070d0', '#90b0ff', '#c8d8ff'],
    ['#f090c0', '#b05080', '#f5b0d8', '#ffe0f0'],
    ['#90c0f0', '#5090d0', '#b8dcff', '#e0f0ff'],
  ];
  const pal = palettes[Math.floor(rand() * palettes.length)];

  // dark base
  ctx.fillStyle = '#f0e8ff';
  ctx.fillRect(0, 0, 240, 240);

  // abstract shapes
  for (let i = 0; i < 8; i++) {
    const x = rand() * 240;
    const y = rand() * 240;
    const r = 30 + rand() * 80;
    const grd = ctx.createRadialGradient(x, y, 0, x, y, r);
    grd.addColorStop(0, pal[Math.floor(rand() * pal.length)] + '44');
    grd.addColorStop(1, 'transparent');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  }

  // grid lines
  ctx.strokeStyle = pal[0] + '18';
  ctx.lineWidth = 0.5;
  for (let i = 0; i < 12; i++) {
    ctx.beginPath();
    ctx.moveTo(i * 20, 0); ctx.lineTo(i * 20, 240);
    ctx.moveTo(0, i * 20); ctx.lineTo(240, i * 20);
    ctx.stroke();
  }

  // waveform pattern
  ctx.beginPath();
  ctx.strokeStyle = pal[0] + '60';
  ctx.lineWidth = 1;
  for (let x = 0; x < 240; x += 2) {
    const y = 120 + Math.sin((x / 240) * Math.PI * 6 + seed) * (20 + rand() * 30)
              + Math.sin((x / 240) * Math.PI * 14 + seed * 0.7) * 10;
    if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();

  canvas.style.display = 'block';
}

function clearArtCanvas() {
  const canvas = document.getElementById('art-canvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  canvas.style.display = 'none';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

window.addEventListener('resize', () => {
  const canvas = document.getElementById('visualizer-canvas');
  canvas.width = canvas.offsetWidth;
});
</script>
